[package]
name = "mediapm"
version = "0.1.0"
edition = "2024"
rust-version = "1.94.0"
description = "Declarative media package manager"
license-file = "LICENSE.txt"
publish = false

[dependencies]

[dev-dependencies]
cargo-husky = { version = "1", default-features = false, features = ["user-hooks"] }

[package.metadata.bin]
# <https://github.com/cargo-bins/cargo-binstall/issues/2476>
# cargo-binstall = { version = "1.17.8" }
commitlint-rs = { bins = ["commitlint"], version = "0.2.4" }

[workspace]
members = ["scripts/cargo-bin"]
