[workspace]
resolver = "3"
members = [
	"scripts/cargo-bin",
	"src/cas",
	"src/conductor",
	"src/conductor-builtins/fs-ops",
	"src/conductor-builtins/import",
	"src/conductor-builtins/zip",
	"src/mediapm",
]

[workspace.package]
# name = "mediapm"
version = "0.0.0"
edition = "2024"
rust-version = "1.94.0"
description = "Declarative media package manager"
license-file = "LICENSE.txt"
publish = false
# build = "scripts/build.rs"

[workspace.dependencies]
anyhow = "1.0.100"
async-trait = "0.1.89"
blake3 = "1.8.2"
bytes = "1.10.1"
cargo-husky = { version = "1.5.0", default-features = false, features = ["user-hooks"] }
clap = { version = "4.5.48", features = ["derive"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.145"
thiserror = "2.0.17"
tokio = { version = "1.48.0", features = ["fs", "io-util", "macros", "rt-multi-thread", "time"] }
url = "2.5.7"

[workspace.metadata.bin]
# <https://github.com/cargo-bins/cargo-binstall/issues/2476>
# cargo-binstall = { version = "1.17.8" }
commitlint-rs = { bins = ["commitlint"], version = "0.2.4" }
rumdl = { version = "0.1.59" }
