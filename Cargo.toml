[package]
name = "mediapm"
version = "0.1.0"
edition = "2024"
rust-version = "1.94.0"
description = "Declarative media package manager"
license-file = "LICENSE.txt"
publish = false
build = "scripts/build.rs"

[dependencies]
anyhow = "1.0.100"
blake3 = "1.8.2"
clap = { version = "4.5.48", features = ["derive"] }
hex = "0.4.3"
path-clean = "1.0.1"
reqwest = { version = "0.12.24", default-features = false, features = ["json", "rustls-tls"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.145"
thiserror = "2.0.17"
time = { version = "0.3.44", features = ["formatting", "parsing"] }
tokio = { version = "1.48.0", features = ["fs", "io-util", "macros", "rt-multi-thread", "time"] }
async-trait = "0.1.89"
url = "2.5.7"
walkdir = "2.5.0"

[dev-dependencies]
cargo-husky = { version = "1.5.0", default-features = false, features = ["user-hooks"] }
tempfile = "3.23.0"

[package.metadata.bin]
# <https://github.com/cargo-bins/cargo-binstall/issues/2476>
# cargo-binstall = { version = "1.17.8" }
commitlint-rs = { bins = ["commitlint"], version = "0.2.4" }
rumdl = { version = "0.1.59" }

[workspace]
members = ["scripts/cargo-bin"]
